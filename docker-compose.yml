version: '3.8'

services:
  db:
    image: postgres:13
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - todo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./
    ports:
      - "${APP_PORT}:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  postgres_data: